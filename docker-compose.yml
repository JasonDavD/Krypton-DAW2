services:
  db:
    image: mysql:8
    container_name: krypton-db
    environment:
      MYSQL_DATABASE: krypton
      MYSQL_USER: krypton
      MYSQL_PASSWORD: krypton
      MYSQL_ROOT_PASSWORD: root
    ports:
      # Host 3307 → 3306 del contenedor. 3307 para no chocar con un MySQL nativo en 3306.
      - "3307:3306"
    volumes:
      - krypton_mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u krypton -pkrypton --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Broker de mensajería para eventos asíncronos (F6: order → notification).
  rabbitmq:
    image: rabbitmq:3-management
    container_name: krypton-rabbit
    ports:
      - "5672:5672"     # AMQP (lo usan los servicios)
      - "15672:15672"   # consola web de administración (http://localhost:15672, guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  krypton_mysqldata:
