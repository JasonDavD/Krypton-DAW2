server:
  port: 8085

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/krypton_payments
    username: krypton
    password: krypton
  jpa:
    hibernate:
      ddl-auto: validate            # Flyway es dueno del schema; Hibernate solo valida
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

# Secreto JWT compartido: DEBE coincidir con users/catalog/order (mismo secreto = misma firma HMAC).
app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-krypton-secret-key-1234567890}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP:false}
