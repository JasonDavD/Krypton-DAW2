# Stack COMPLETO de Krypton containerizado: infra (MySQL + RabbitMQ) + los 9 servicios.
# A diferencia de docker-compose.yml (solo infra, para el modo `java -jar` local), aca
# TODO corre en contenedores y se resuelve por nombre de servicio en la red de compose.
#
# Build: requiere el jar YA construido en cada services/<svc>/target/ (mvn package antes).
# La unica puerta publica es el api-gateway (:8080). Eureka (:8761) y RabbitMQ (:15672)
# se exponen solo para inspeccion.

services:
  # --- Infra ---------------------------------------------------------------
  krypton-db:
    image: mysql:8
    container_name: krypton-bd
    environment:
      MYSQL_DATABASE: krypton
      MYSQL_USER: krypton
      MYSQL_PASSWORD: krypton
      MYSQL_ROOT_PASSWORD: root
    volumes:
      # Volumen propio: NO choca con el de docker-compose.yml (krypton_mysqldata).
      - krypton_mysqldata_full:/var/lib/mysql
      # Crea las 6 bases por servicio antes de que arranque cualquier Flyway.
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    # No exponemos puerto al host: evita chocar con el MySQL de dev (3307).
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u krypton -pkrypton --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: krypton-mensajeria
    hostname: krypton-rabbit
    ports:
      - "15672:15672"   # consola web (http://localhost:15672, guest/guest)
    volumes:
      - krypton_rabbitdata_full:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Service discovery ---------------------------------------------------
  eureka-server:
    build:
      context: ./services
      dockerfile: eureka-server/Dockerfile
    container_name: krypton-eureka
    ports:
      - "8761:8761"     # consola de Eureka (solo inspeccion)

  # --- Gateway (unica puerta publica) --------------------------------------
  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    container_name: krypton-gateway
    ports:
      - "8080:8080"     # aca apunta el frontend
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      EUREKA_PREFER_IP: "true"
    depends_on:
      eureka-server:
        condition: service_started

  # --- Servicios de negocio ------------------------------------------------
  users-service:
    build:
      context: ./services
      dockerfile: users-service/Dockerfile
    container_name: krypton-usuarios
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      EUREKA_PREFER_IP: "true"
      DB_HOST: krypton-db
      DB_PORT: "3306"
    depends_on:
      krypton-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  catalog-service:
    build:
      context: ./services
      dockerfile: catalog-service/Dockerfile
    container_name: krypton-catalogo
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      EUREKA_PREFER_IP: "true"
      DB_HOST: krypton-db
      DB_PORT: "3306"
    depends_on:
      krypton-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  order-service:
    build:
      context: ./services
      dockerfile: order-service/Dockerfile
    container_name: krypton-pedidos
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      EUREKA_PREFER_IP: "true"
      DB_HOST: krypton-db
      DB_PORT: "3306"
      RABBITMQ_HOST: rabbitmq
    depends_on:
      krypton-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  notification-service:
    build:
      context: ./services
      dockerfile: notification-service/Dockerfile
    container_name: krypton-notificaciones
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      EUREKA_PREFER_IP: "true"
      RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  payment-service:
    build:
      context: ./services
      dockerfile: payment-service/Dockerfile
    container_name: krypton-pagos
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      EUREKA_PREFER_IP: "true"
      DB_HOST: krypton-db
      DB_PORT: "3306"
    depends_on:
      krypton-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  review-service:
    build:
      context: ./services
      dockerfile: review-service/Dockerfile
    container_name: krypton-resenas
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      EUREKA_PREFER_IP: "true"
      DB_HOST: krypton-db
      DB_PORT: "3306"
    depends_on:
      krypton-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  promo-service:
    build:
      context: ./services
      dockerfile: promo-service/Dockerfile
    container_name: krypton-promociones
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      EUREKA_PREFER_IP: "true"
      DB_HOST: krypton-db
      DB_PORT: "3306"
    depends_on:
      krypton-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

volumes:
  krypton_mysqldata_full:
  krypton_rabbitdata_full:
